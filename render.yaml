###############################################################################
# Render Blueprint — Accutek Solar Website
# https://render.com/docs/blueprint-spec
###############################################################################

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: accutek-solar-api
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: accutek_solar
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Frontend (Next.js static export) ──────────────────────────────────────
  - type: web
    name: accutek-solar-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: out
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
