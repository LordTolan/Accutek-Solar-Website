###############################################################################
# Render Blueprint — Accutek Solar Website
# https://render.com/docs/blueprint-spec
#
# This file lets you deploy the full stack (frontend + backend) in one click.
# Go to https://dashboard.render.com → New → Blueprint → connect this repo.
###############################################################################

services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  - type: web
    name: accutek-solar-api
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: accutek_solar
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.11.9"

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  - type: web
    name: accutek-solar-web
    runtime: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: REACT_APP_BACKEND_URL
        sync: false
      - key: NODE_VERSION
        value: "20.11.0"
